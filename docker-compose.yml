# Beacon Lab — agent-api + OpenClawD gateway
#
# Primera vez:
#   cp .env.example .env
#   ./scripts/setup-openclawd.sh
#   docker compose up -d --build
#
# Prueba local:
#   curl http://localhost:8010/health
#   curl -X POST http://localhost:8010/briefing \
#     -H "Content-Type: application/json" \
#     -d '{"date":"2026-06-09","language":"es","max_words":1200}'
#
# OpenClaw Control UI: http://localhost:18789
#
# En el VPS (junto a n8n en /opt/n8n):
#   1. Clona/copia este repo en /opt/agent-beaconlab
#   2. cp .env.example .env && ./scripts/setup-openclawd.sh
#   3. Comenta "ports" en agent-api y openclawd; usa red traefik_proxy
#   4. docker compose up -d --build
#   5. En n8n: POST http://agent-api:8000/briefing

services:
  openclawd:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclawd
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /home/node
      TMPDIR: /home/node/.openclaw/tmp
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - ./openclaw/workspace:/home/node/.openclaw/workspace
      - ./openclaw/auth-secrets:/home/node/.config/openclaw
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    init: true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - beaconlab

  agent-api:
    build: .
    container_name: agent-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENCLAWD_BASE_URL: http://openclawd:18789
      OPENCLAWD_API_KEY: ${OPENCLAW_GATEWAY_TOKEN}
    ports:
      - "${AGENT_API_PORT:-8010}:8000"
    depends_on:
      openclawd:
        condition: service_healthy
    networks:
      - beaconlab

networks:
  beaconlab:
    driver: bridge

